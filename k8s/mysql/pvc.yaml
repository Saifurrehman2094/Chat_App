---
# MySQL Persistent Volume Claim
# Provides persistent storage for database

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: chatapp
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce # Single node read-write
  storageClassName: microk8s-hostpath # MicroK8s default storage class
  resources:
    requests:
      storage: 10Gi # 10GB storage for database
