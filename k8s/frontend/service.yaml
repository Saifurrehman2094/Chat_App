---
# Frontend Internal Service
# Accessed internally by nginx-gateway

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chatapp
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  type: ClusterIP  # Internal only; external access goes through nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
