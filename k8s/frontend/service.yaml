---
# Frontend Internal Service
# Provides stable DNS for nginx gateway to connect

apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: chatapp
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  type: ClusterIP  # Internal service
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
