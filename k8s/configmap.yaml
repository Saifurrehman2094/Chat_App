---
# ConfigMaps for ChatApp
# Store non-sensitive configuration data

# Application Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatapp-config
  namespace: chatapp
  labels:
    app: chatapp
data:
  # Backend configuration
  BACKEND_ENV: "production"
  LOG_LEVEL: "info"

  # Frontend configuration
  FRONTEND_ENV: "production"

  # Application metadata
  APP_NAME: "ChatApp"
  APP_VERSION: "1.0.0"

  # Feature flags
  FEATURE_GROUP_CHAT: "true"
  FEATURE_NOTIFICATIONS: "true"

---
# Nginx Gateway Configuration (embedded in ConfigMap)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-gateway-config
  namespace: chatapp
  labels:
    app: nginx-gateway
data:
  nginx.conf: |
    upstream frontend {
      server frontend.chatapp.svc.cluster.local:80;
    }

    upstream backend {
      server backend.chatapp.svc.cluster.local:3000;
    }

    server {
      listen 80;
      server_name _;
      
      client_body_timeout 60s;
      client_header_timeout 60s;
      proxy_connect_timeout 600s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      
      gzip on;
      gzip_types text/plain text/css application/json application/javascript;
      gzip_min_length 1000;
      
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      
      location /health {
        access_log off;
        return 200 "gateway-ok\n";
        add_header Content-Type text/plain;
      }
      
      location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
      
      location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
      }
      
      location /socket.io {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
      }
    }
