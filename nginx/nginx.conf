# Nginx Gateway Configuration
# Routes traffic to frontend (SPA) and backend (API + WebSocket)
# This serves as the single entry point for the application

upstream frontend {
    # Kubernetes DNS: frontend service in chatapp namespace
    server frontend.chatapp.svc.cluster.local:80;
}

upstream backend {
    # Kubernetes DNS: backend service in chatapp namespace
    server backend.chatapp.svc.cluster.local:3000;
}

server {
    listen 80;
    server_name _;
    
    # Client request timeout
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Proxy timeout (important for long-lived WebSocket)
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    # Buffer sizes for large requests
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "gateway-ok\n";
        add_header Content-Type text/plain;
    }
    
    # Root path - serve frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Keep-alive
        proxy_set_header Connection "";
    }
    
    # API endpoints - route to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # CORS headers if needed
        proxy_set_header Access-Control-Allow-Origin *;
        proxy_set_header Access-Control-Allow-Credentials true;
        proxy_set_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        proxy_set_header Access-Control-Allow-Headers "Content-Type, Authorization";
        
        # Keep-alive
        proxy_set_header Connection "";
    }
    
    # WebSocket upgrade for Socket.IO
    # This handles real-time messaging
    location /socket.io {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # Critical for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long timeout for persistent WebSocket
        proxy_read_timeout 86400;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
