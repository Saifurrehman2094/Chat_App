---
# Main Ansible Playbook for ChatApp Kubernetes Deployment
# Orchestrates installation of Docker, MicroK8s, kubectl, and ArgoCD

- name: ChatApp Infrastructure Setup
  hosts: k8s_nodes
  gather_facts: yes
  become: yes

  pre_tasks:
    - name: Bootstrap Python setuptools (required for Ansible pip module)
      ansible.builtin.raw: |
        apt-get update -qq && \
        apt-get install -y python3-setuptools python3-pkg-resources python3-pip
      changed_when: false

    - name: Display deployment information
      ansible.builtin.debug:
        msg: |
          =========================================
          ChatApp Kubernetes Cluster Setup
          =========================================
          Host: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Python: {{ ansible_python_version }}
          Project: {{ project_name }}
          Environment: {{ environment }}
          =========================================

    - name: Check if system is Ubuntu
      ansible.builtin.fail:
        msg: "This playbook requires Ubuntu. Current OS: {{ ansible_distribution }}"
      when: ansible_distribution != "Ubuntu"

  roles:
    - name: Install system dependencies and Docker
      role: common
      tags: [system, docker]

    - name: Install and configure MicroK8s
      role: microk8s
      tags: [microk8s, kubernetes]

    - name: Configure kubectl access
      role: kubectl
      tags: [kubectl]

    - name: Deploy ArgoCD for GitOps
      role: argocd
      tags: [argocd, gitops]

  post_tasks:
    - name: Get MicroK8s status
      ansible.builtin.command: microk8s status
      register: mk8s_status
      changed_when: false

    - name: Get cluster info
      ansible.builtin.command: microk8s kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Get nodes
      ansible.builtin.command: microk8s kubectl get nodes -o wide
      register: nodes_info
      changed_when: false

    - name: Display cluster status
      ansible.builtin.debug:
        msg: |
          =========================================
          Deployment Complete!
          =========================================
          MicroK8s Status:
          {{ mk8s_status.stdout }}

          Cluster Info:
          {{ cluster_info.stdout }}

          Nodes:
          {{ nodes_info.stdout }}

          Next Steps:
          1. Deploy ChatApp manifests:
             kubectl apply -f ../k8s/

          2. Monitor ArgoCD:
             kubectl port-forward -n argocd svc/argocd-server 8080:443
             Access: https://localhost:8080

          3. Check application pods:
             kubectl get pods -n chatapp
          =========================================

    - name: Save kubeconfig for local access
      ansible.builtin.fetch:
        src: /home/ubuntu/.kube/config
        dest: ./kubeconfig_{{ inventory_hostname }}
        flat: yes
      ignore_errors: yes

  handlers:
    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Restart snapd
      ansible.builtin.systemd:
        name: snapd
        state: restarted

    - name: Reload system daemon
      ansible.builtin.systemd:
        daemon_reload: yes
