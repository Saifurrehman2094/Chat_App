---
# Common Role - Install system dependencies and Docker
# This role prepares the system with all necessary packages

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  retries: 3
  delay: 10

- name: Install system dependencies
  apt:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - git
      - wget
      - net-tools
      - htop
      - vim
      - jq
      - unzip
      - build-essential
      - libffi-dev
      - libssl-dev
      - python3
      - python3-pip
      - python3-dev
      - python3-venv
  retries: 3
  delay: 10

- name: Upgrade pip, setuptools, and wheel
  pip:
    name: "{{ item }}"
    state: latest
  loop:
    - pip
    - setuptools
    - wheel
  retries: 3
  delay: 10

- name: Install Python modules for Kubernetes
  pip:
    name: "{{ item }}"
    state: present
  loop:
    - kubernetes
    - pyyaml
    - requests
  retries: 3
  delay: 10

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  retries: 3
  delay: 10

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch={{ ansible_machine }}] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
    state: present
    filename: docker-ce
  retries: 3
  delay: 10

- name: Update apt cache after Docker repo
  apt:
    update_cache: yes
  retries: 3
  delay: 10

- name: Install Docker
  apt:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
  retries: 3
  delay: 10

- name: Create docker group
  group:
    name: docker
    state: present

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker,sudo
    append: yes

- name: Enable and start Docker service
  systemd:
    name: docker
    state: started
    enabled: yes
    daemon_reload: yes

- name: Configure Docker daemon for container logs
  copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "default-runtime": "runc",
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        }
      }
    dest: /etc/docker/daemon.json
  notify: Restart docker

- name: Verify Docker installation
  shell: docker --version
  register: docker_version
  changed_when: false

- name: Display Docker version
  debug:
    msg: "{{ docker_version.stdout }}"

- name: Test Docker installation
  shell: docker run --rm hello-world
  register: docker_test
  changed_when: false
  retries: 3
  delay: 10
